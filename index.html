<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Официальный путь к SDK Битрикс24 -->
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <style>
        body { font-family: "Open Sans", sans-serif; padding: 20px; background: #f4f7f8; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 150px; margin: 15px 0; border: 1px solid #ced4da; border-radius: 4px; padding: 10px; resize: vertical; }
        .btn { background: #2fc6f6; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #1eb5e5; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        #log { margin-top: 20px; padding: 10px; background: #222; color: #0f0; font-family: monospace; font-size: 12px; height: 200px; overflow-y: auto; border-radius: 4px; }
        .err { color: #ff5b5b; }
    </style>
</head>
<body>

<div class="container">
    <h2>Массовый импорт обучающихся</h2>
    
    <div id="setup">
        <button class="btn" onclick="selectCompany()">1. Выбрать компанию</button>
        <p id="company-name">Компания не выбрана</p>
    </div>

    <textarea id="data-input" placeholder="Вставьте строки из Google Таблицы (ФИО, Email, Телефон...)"></textarea>
    
    <button id="run-btn" class="btn" onclick="startImport()" disabled>2. Запустить импорт</button>

    <div id="log">Ожидание инициализации Битрикс24...</div>
</div>

<script>
    let selectedCompanyId = null;

    // Инициализация библиотеки Битрикса
    BX24.init(function(){
        addLog("Приложение готово к работе.");
    });

    function selectCompany() {
        BX24.selectCRM({
            entityType: ['company'],
            multiple: false
        }, function(result) {
            if (result && result.company) {
                // Извлекаем чистый ID компании (из CO_123 получаем 123)
                selectedCompanyId = result.company.id.replace('CO_', '');
                document.getElementById('company-name').innerText = "Выбрано: " + result.company.title;
                document.getElementById('run-btn').disabled = false;
                addLog("Компания выбрана: ID " + selectedCompanyId);
            }
        });
    }

    async function startImport() {
        const rawData = document.getElementById('data-input').value.trim();
        if (!rawData) return alert("Вставьте данные из таблицы!");

        const rows = rawData.split('\n');
        document.getElementById('run-btn').disabled = true;
        addLog(`Найдено строк для обработки: ${rows.length}`);

        for (let i = 0; i < rows.length; i++) {
            const cols = rows[i].split('\t');
            
            // Маппинг колонок (подправьте индексы под вашу таблицу если нужно)
            const contact = {
                NAME: cols[3]?.trim(), // ФИО
                EMAIL: cols[5]?.trim(), // Email
                PHONE: cols[6]?.trim()  // Телефон
            };

            if (!contact.EMAIL) {
                addLog(`Строка ${i+1}: Пропуск (нет Email)`, 'err');
                continue;
            }

            try {
                await syncContact(contact);
                // Пауза 500мс для соблюдения лимитов API (2 запроса в сек)
                await new Promise(r => setTimeout(r, 500));
            } catch (e) {
                addLog(`Ошибка в строке ${i+1}: ${e.message}`, 'err');
            }
        }
        
        addLog("--- Импорт завершен ---");
        document.getElementById('run-btn').disabled = false;
    }

    function syncContact(data) {
        return new Promise((resolve, reject) => {
            // 1. Ищем по Email
            BX24.callMethod('crm.contact.list', {
                filter: { "EMAIL": data.EMAIL },
                select: ["ID"]
            }, function(res) {
                if (res.error()) return reject(new Error(res.error_description()));

                const found = res.data();
                
                if (found.length > 0) {
                    const contactId = found[0].ID;
                    // 2. Если найден — обновляем привязку к компании
                    BX24.callMethod('crm.contact.update', {
                        id: contactId,
                        fields: { "COMPANY_ID": selectedCompanyId }
                    }, (r) => {
                        addLog(`Обновлен контакт: ${data.NAME} (ID: ${contactId})`);
                        resolve();
                    });
                } else {
                    // 3. Если не найден — создаем новый
                    BX24.callMethod('crm.contact.add', {
                        fields: {
                            "NAME": data.NAME,
                            "OPENED": "Y",
                            "COMPANY_ID": selectedCompanyId,
                            "PHONE": [{ "VALUE": data.PHONE, "VALUE_TYPE": "WORK" }],
                            "EMAIL": [{ "VALUE": data.EMAIL, "VALUE_TYPE": "WORK" }]
                        }
                    }, (r) => {
                        if (r.error()) return reject(new Error(r.error_description()));
                        addLog(`Создан новый контакт: ${data.NAME}`);
                        resolve();
                    });
                }
            });
        });
    }

    function addLog(msg, type = '') {
        const logDiv = document.getElementById('log');
        const entry = document.createElement('div');
        if (type === 'err') entry.className = 'err';
        entry.innerText = `> ${msg}`;
        logDiv.prepend(entry);
    }
</script>
</body>
</html>
