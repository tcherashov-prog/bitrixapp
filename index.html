<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Hello World App</title>
    <!-- Подключаем JS SDK Битрикс24 -->
    <script src="//://api.bitrix24.com"></script>
</head>
<body>
    <div id="app">Загрузка...</div>

    <script>

            console.log('Приложение успешно запущено');
        });
    </script>
</body>
</html>
